<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Wheel</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }
        .wheel-container {
            position: relative;
        }
        canvas {
            background-color: #ffffff;
            border-radius: 50%;
        }
        .pointer {
            position: absolute;
            right: -60px; /* Move pointer outside the pie chart */
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            z-index: 10;
        }
        .center-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid white;
        }
        .spin-button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background-color: #007BFF;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
        }
        .spin-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
    <body>

        <h1>Testing Heading</h1>

        <p>Testing paragraphs.</p>

        <div class="wheel-container">
            <canvas id="spinWheel" width="400" height="400"></canvas>
            <img src="https://cdn-icons-png.flaticon.com/128/9590/9590006.png" alt="Pointer" class="pointer">
        </div>
        <button class="spin-button" onclick="spinWheel()">Spin</button>

        <script>
            const canvas = document.getElementById('spinWheel');
            const ctx = canvas.getContext('2d');
            const sections = ['1000', '2000', '3000', '4000', '5000', '6000', '7000', '8000', '9000', '10000', '0'];
            const colors = [
            '#FF6347', '#FFD700', '#32CD32', '#87CEEB', '#6A5ACD',
            '#FF69B4', '#00CED1', '#FFD700', '#DC143C', '#4682B4', '#32CD32'];
            const wheelRadius = canvas.width / 2;
            const arcSize = (2 * Math.PI) / sections.length;
            let currentAngle = 0;
            let spinSpeed = 0;
            let isSpinning = false;

            //Drawing the wheel
            function drawWheel() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let startAngle = currentAngle;
                sections.forEach((amount, index) => {
                    const endAngle = startAngle + arcSize;
                    //Drawing the slice
                    ctx.beginPath();
                    ctx.moveTo(wheelRadius, wheelRadius);
                    ctx.arc(wheelRadius, wheelRadius, wheelRadius, startAngle, endAngle);
                    ctx.closePath();
                    ctx.fillStyle = colors[index];
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.stroke();
                    //Adding text inside each section
                    ctx.save();
                    ctx.translate(wheelRadius, wheelRadius);
                    ctx.rotate(startAngle + arcSize / 2);
                    ctx.textAlign = 'center';
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 16px Arial';
                    ctx.fillText(amount, wheelRadius / 1.5, 10);
                    ctx.restore();
                    startAngle = endAngle;
                });
            }

            //Wheel spinning
            function spinWheel() {
                if (isSpinning) return;
                isSpinning = true;
                spinSpeed = Math.random() * 10 + 20;
                const spinDuration = Math.random() * 5000 + 2500;
                const deceleration = spinSpeed / (spinDuration / 20);
                const spinInterval = setInterval(() => {
                    currentAngle += spinSpeed * Math.PI / 180;
                    spinSpeed -= deceleration;
                    if (spinSpeed <= 0) {
                        clearInterval(spinInterval);
                        isSpinning = false;
                        showResult();
                    }
                    drawWheel();
                }, 20);
            }

            function showResult() {
                const finalAngle = currentAngle % (2 * Math.PI);
                const winningIndex = Math.floor((sections.length - (finalAngle / (2 * Math.PI) * sections.length)) % sections.length);
                const winningAmount = sections[winningIndex];

                Swal.fire({
                    title: 'Congratulations!',
                    text: `You won ${winningAmount}`,
                    icon: 'success',
                    confirmButtonText: 'OK'
                });
            }

            drawWheel();
        </script>
    </body>
</html>
