<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YACM</title>
    <link rel="stylesheet" href="style.css">
    <!-- <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> -->
</head>
<body>
    <div class="wheel-container">
        <canvas id="spinWheel" width="800" height="100"></canvas>
    </div>
    <div class="inventory-container">
        <canvas id="inventory" width="1200" height="550"></canvas>
    </div>
    <div class="controls">
        <button class="spin-button" onclick="spinWheel()">Spin</button>
        <button class="spin-button" onclick="addTask()">Add Task</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
