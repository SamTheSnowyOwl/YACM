<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YACM</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="wheel-container">
        <canvas id="spinWheel" width="800" height="100" style="border-radius: 15px;"></canvas>
        <img src="https://www.freepnglogos.com/uploads/arrow-png/file-arrow-down-2.png" alt="Pointer" id="blockPointer" class="pointer" style="right:371px">
    </div>
    <div class="inventory-container">
        <canvas id="inventory" width="1200" height="550" style="background-color: #1c1c1c;"></canvas>
    </div>
    
    <div class="controls">
        <button class="spin-button" onclick="spinWheel()">Spin</button>
        <button class="spin-button" onclick="addTask()">Add Task</button>
        <button class="del-button" onclick="removeTask(); this.classList.toggle('active')">Delete Task</button>
    </div>    

    <div class="editable-card">
        <h2 contenteditable="true" style="margin-bottom: 5px; color: antiquewhite;">Reminders</h2>
        <p contenteditable="true" style="background-color: #1c1c1c; color: antiquewhite; margin-top: 0; width: 60vw; min-height: 5vh;">
            You can click inside this paragraph block and type whatever text you want. It behaves completely like a rich text canvas area.
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
